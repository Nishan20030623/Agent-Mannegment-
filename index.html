<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sub Agent Dashboard - Realtime</title>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCxk8X9g6vDEOC3ZAQlGSYxC-SESW2vamY",
            authDomain: "nishanx-a8c4e.firebaseapp.com",
            projectId: "nishanx-a8c4e",
            storageBucket: "nishanx-a8c4e.firebasestorage.app",
            messagingSenderId: "659660529862",
            appId: "1:659660529862:web:0fcb0e3be637e1ab6037c7",
            measurementId: "G-P0QL7Z2R3B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Auto Login via URL ---
        const urlParams = new URLSearchParams(window.location.search);
        const agentIdFromUrl = urlParams.get('id');

        window.onload = function() {
            if(agentIdFromUrl) {
                document.getElementById('loginId').value = agentIdFromUrl;
                login();
            }
        };

        window.login = function() {
            const id = document.getElementById('loginId').value.trim();
            onValue(ref(db, 'agents/' + id), (snapshot) => {
                const agent = snapshot.val();
                if(agent) {
                    document.getElementById('loginDiv').style.display = 'none';
                    document.getElementById('dashDiv').style.display = 'block';
                    document.getElementById('nameDisp').innerText = agent.name;
                    document.getElementById('balDisp').innerText = "Rs " + agent.commissionBalance.toFixed(2);
                    loadTransactions(id);
                } else { alert("මෙම ID එක පද්ධතියේ නැත!"); }
            });
        };

        function loadTransactions(agentId) {
            const transRef = query(ref(db, 'transactions'), orderByChild('agentId'), equalTo(agentId));
            onValue(transRef, (snapshot) => {
                const data = snapshot.val();
                const tbody = document.getElementById('transTable');
                tbody.innerHTML = '';
                if(!data) return;

                let transArray = Object.values(data).sort((a,b) => new Date(b.date) - new Date(a.date));

                transArray.forEach(t => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${new Date(t.date).toLocaleDateString()}</td>
                            <td style="color:${t.type=='Deposit'?'#00c853':'#2196f3'}">${t.type}</td>
                            <td>${t.amount}</td>
                            <td style="color:#00c853">+${t.commission.toFixed(2)}</td>
                        </tr>`;
                });
            });
        }
    </script>
    <style>
        :root { --p: #00a650; --bg: #0b1a20; --c: #152b36; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin:0; }
        .card { background: var(--c); padding: 25px; border-radius: 15px; max-width: 500px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border: 1px solid #233e4d; }
        input, button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: var(--p); color: white; font-weight: bold; cursor: pointer; }
        .bal-box { background: rgba(255,193,7,0.1); border: 1px solid #ffc107; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .bal-box h1 { font-size: 35px; color: #ffc107; margin: 0; }
        table { width: 100%; font-size: 14px; border-collapse: collapse; margin-top: 20px; }
        th, td { border-bottom: 1px solid #233e4d; padding: 12px; text-align: left; }
        th { color: #8899a6; font-weight: normal; }
    </style>
</head>
<body>
    <div id="loginDiv" class="card" style="margin-top: 50px;">
        <h2 style="color:var(--p)">Sub Agent Login</h2>
        <input id="loginId" placeholder="ඔබගේ User ID එක">
        <button onclick="login()">Dashboard එකට යන්න</button>
    </div>

    <div id="dashDiv" style="display:none;">
        <div class="card">
            <h2 id="nameDisp">---</h2>
            <p style="color:#8899a6; margin:0;">ඔබගේ දැනට පවතින කොමිස් මුදල</p>
            <div class="bal-box">
                <h1 id="balDisp">Rs 0.00</h1>
            </div>
            <h3>පසුගිය ගනුදෙනු</h3>
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>දිනය</th><th>වර්ගය</th><th>මුදල</th><th>කොමිස්</th></tr></thead>
                    <tbody id="transTable"></tbody>
                </table>
            </div>
            <button onclick="location.reload()" style="background:#222; margin-top:20px; font-size:12px;">Refresh Data</button>
        </div>
    </div>
</body>
</html>
